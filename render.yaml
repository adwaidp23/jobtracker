services:
  - type: web
    name: jobtracker-api
    env: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && (celery -A app.worker.celery_app worker -B --loglevel=info & uvicorn app.main:app --host 0.0.0.0 --port $PORT)"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: jobtracker-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: jobtracker-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 11520

  - type: keyvalue
    name: jobtracker-redis
    plan: free
    ipAllowList: []

databases:
  - name: jobtracker-db
    databaseName: jobtracker
    user: jobtracker
    plan: free
